name: ACO Autonomous Routine

on:
  schedule:
    - cron: '0 * * * *' # 1時間に1回、自動実行
  workflow_dispatch:      # 手動実行も可能にする

jobs:
  run-aco-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Market Monitor
        run: python market_monitor.py
