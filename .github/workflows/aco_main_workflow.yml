name: ACO Full Operational Routine

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  operational-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Step 1 Financial Record
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          echo "=== File Check ==="
          ls -R
          echo "=== Execution ==="
          python ledger_test.py

      - name: Step 2 Market Scan
        run: python market_scan.py

      - name: Step 3 Send COO Report
        env:
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: python send_report_mail.py

      - name: Step 4 Auto-Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "ACO-Auto-Bot"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "ACO: System Self-Update [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
